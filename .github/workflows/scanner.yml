name: 5-Minute Spread Scanner

on:
  schedule:
    # This triggers every 5 minutes, every day
    - cron: '*/5 * * * *'
  workflow_dispatch: # Manual trigger button

# This prevents multiple versions of the script from running at the same time
concurrency:
  group: scanner-group
  cancel-in-progress: true

jobs:
  scan-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Scanner
        env:
          TRADIER_API_KEY: ${{ secrets.TRADIER_API_KEY }}
        run: python scanner.py

      - name: Update Data File
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add scan.json
          # Only commit if the file actually changed
          git commit -m "Market Data Update: $(date)" || echo "No changes to commit"
          git push
