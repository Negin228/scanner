name: Spread Scanner Service

on:
  schedule:
    # Runs every 30 minutes during market hours (approx. 13:00 - 21:00 UTC)
    - cron: '*/30 13-21 * * 1-5'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Scanner
        env:
          # This pulls your Tradier key from GitHub Secrets
          TRADIER_API_KEY: ${{ secrets.TRADIER_API_KEY }}
        run: python scanner.py

      - name: Commit and Push signals.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add signals.json
          git commit -m "Automated update: $(date)" || echo "No changes to commit"
          git push
